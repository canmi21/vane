name: Build BSD

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
        description: 'Git ref to checkout (tag or branch)'
      skip_release:
        required: false
        type: boolean
        default: false
        description: 'Skip packaging and uploading artifacts'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-freebsd
            os: freebsd
            arch: x86_64
            features: ''
          - target: x86_64-unknown-netbsd
            os: netbsd
            arch: x86_64
            features: '--no-default-features --features full,ring'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Get package info
        id: pkg
        run: |
          # Try to get bin name from [[bin]], fallback to [package] name
          BIN_NAME=$(grep -A1 '^\[\[bin\]\]' Cargo.toml | grep '^name' | head -1 | sed 's/.*= *"\([^"]*\)".*/\1/' || true)
          if [ -z "$BIN_NAME" ]; then
            BIN_NAME=$(grep '^name' Cargo.toml | head -1 | sed 's/.*= *"\([^"]*\)".*/\1/')
          fi
          VERSION="${{ inputs.ref }}"
          VERSION="${VERSION#v}"
          echo "bin_name=$BIN_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --profile minimum --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package
        if: ${{ !inputs.skip_release }}
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/minimum/${{ steps.pkg.outputs.bin_name }} dist/
          cp LICENSE dist/
          cd dist
          tar -czvf ../${{ steps.pkg.outputs.bin_name }}-v${{ steps.pkg.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz *

      - name: Upload artifact
        if: ${{ !inputs.skip_release }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.pkg.outputs.bin_name }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.pkg.outputs.bin_name }}-v${{ steps.pkg.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 1