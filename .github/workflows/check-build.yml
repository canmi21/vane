name: Build Check

on:
  pull_request:
    branches: ['latest']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to check (optional)'
        required: false
        type: string

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yml
    with:
      ref: ${{ github.event.inputs.ref || github.ref }}
      skip_release: true

  build-macos:
    uses: ./.github/workflows/build-macos.yml
    with:
      ref: ${{ github.event.inputs.ref || github.ref }}
      skip_release: true
