name: Package RHEL

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
        description: 'Git ref to checkout (tag or branch)'

jobs:
  rhel:
    strategy:
      matrix:
        include:
          - arch: x86_64
            rpm_arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            rpm_arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: dnf install -y rpm-build rpmdevtools git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Get package info
        id: pkg
        run: |
          BIN_NAME=$(grep -A1 '^\[\[bin\]\]' Cargo.toml | grep '^name' | head -1 | sed 's/.*= *"\([^"]*\)".*/\1/' || true)
          if [ -z "$BIN_NAME" ]; then
            BIN_NAME=$(grep '^name' Cargo.toml | head -1 | sed 's/.*= *"\([^"]*\)".*/\1/')
          fi
          VERSION="${{ inputs.ref }}"
          VERSION="${VERSION#v}"
          echo "bin_name=$BIN_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download pre-built binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ steps.pkg.outputs.bin_name }}-linux-gnu-${{ matrix.arch }}
          path: build

      - name: Extract binary
        run: |
          cd build
          tar -xzf *.tar.gz
          mv ${{ steps.pkg.outputs.bin_name }} ../

      - name: Setup RPM build environment
        run: |
          rpmdev-setuptree
          cp ${{ steps.pkg.outputs.bin_name }} ~/rpmbuild/SOURCES/vane
          cp package/default/vane.service ~/rpmbuild/SOURCES/
          cp LICENSE ~/rpmbuild/SOURCES/
          cp package/default/.env.example ~/rpmbuild/SOURCES/.env

          # Package config files as tarball (exclude .env.example and vane.service)
          mkdir -p config-tmp
          cp -r package/default/* config-tmp/
          rm -f config-tmp/.env.example config-tmp/vane.service
          tar -czf ~/rpmbuild/SOURCES/config.tar.gz -C config-tmp .

          # Prepare spec file
          cp package/rhel/vane.spec ~/rpmbuild/SPECS/
          DATE=$(date +"%a %b %d %Y")
          sed -i "s/%VERSION%/${{ steps.pkg.outputs.version }}/g" ~/rpmbuild/SPECS/vane.spec
          sed -i "s/%ARCH%/${{ matrix.rpm_arch }}/g" ~/rpmbuild/SPECS/vane.spec
          sed -i "s/%DATE%/$DATE/g" ~/rpmbuild/SPECS/vane.spec

      - name: Build RPM
        run: |
          rpmbuild -bb ~/rpmbuild/SPECS/vane.spec --target ${{ matrix.rpm_arch }}

      - name: Rename and upload
        run: |
          RPM_FILE=$(find ~/rpmbuild/RPMS -name "*.rpm" | head -1)
          FINAL_NAME="${{ steps.pkg.outputs.bin_name }}-v${{ steps.pkg.outputs.version }}-rhel-${{ matrix.arch }}.rpm"
          cp "$RPM_FILE" "$FINAL_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.pkg.outputs.bin_name }}-rhel-${{ matrix.arch }}
          path: ${{ steps.pkg.outputs.bin_name }}-v${{ steps.pkg.outputs.version }}-rhel-${{ matrix.arch }}.rpm
          retention-days: 1
