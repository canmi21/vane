name: style

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: rustfmt + dprint + spec anchors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: Install dprint
        uses: taiki-e/install-action@v2
        with:
          tool: dprint

      - name: dprint check
        run: dprint check

      - name: spec anchor check
        run: perl scripts/check_spec_anchors.pl
