name: style

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - name: Format
        run: cargo fmt --all -- --check

      - name: Install dprint
        uses: taiki-e/install-action@v2
        with:
          tool: dprint

      - name: Prose
        run: dprint check

      - name: Anchors
        run: perl scripts/check_spec_anchors.pl
