[path_comment]
enabled = true

[path_comment.formats]
".go" = "/* $path$file */"
".js" = "/* $path$file */"
".mjs" = "/* $path$file */"
".rs" = "/* $path$file */"
".ts" = "/* $path$file */"
".tsx" = "/* $path$file */"

[path_comment.exclude]
dirs = ["node_modules", "target", "dist", "out", ".next", ".source", "build"]
patterns = ["next-env.d.ts"]
