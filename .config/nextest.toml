experimental = ["setup-scripts"]

[profile.default]
# Warn at 10s, kill at 20s. The slowest legitimate test in this
# workspace is around 4s (boot-health watchdog tied to its 3s
# deadline + spawn jitter). Anything past 10s is already off the
# expected curve; anything past 20s is wedged. terminate-after = 2
# means the kill lands at 2 × period = 20s.
slow-timeout = { period = "10s", terminate-after = 2 }

# Pre-build the `vane` CLI before daemon mgmt tests run. `mgmt.rs`
# shells out to the CLI for pretty/JSON output coverage, but `vane`
# lives in a sibling package and is not in nextest's `--workspace`
# implicit build set. Without this script, each mgmt test process
# races to drive `cargo build` through escargot at test runtime —
# the cold build then collides with the per-test slow-timeout above
# and wedges the suite. Doing it as a setup script keeps the build
# cost outside any test's measured wall-clock.
[scripts.setup.build-vane-cli]
command = "cargo build -p vane --bin vane"
slow-timeout = { period = "60s", terminate-after = 4 }

[[profile.default.scripts]]
filter = "binary(mgmt)"
setup = ["build-vane-cli"]

# The reload + wasm_e2e tests each spawn a real `vaned` process and
# drive it through watcher debounce + reload + listener reconcile.
# Solo, each test finishes in 1-3 s. Under workspace parallelism the
# binary races against the rest of the workspace's TLS handshakes for
# CPU and OS scheduler attention; wait_until polls inflate as a
# result.
#
# Each binary gets its own single-thread group rather than sharing
# one. Sharing meant 9 daemon-spawning tests serialised onto a single
# scheduling slot — tests waiting later in the queue still had their
# wait_until budgets running on wall-clock, and the slowest reload
# scenario (`reload_adds_new_listen_port_serves_traffic`, which has
# to bind a brand-new listener after reload) consistently lost to
# the queue. Two parallel single-thread groups lets each binary make
# progress without queueing behind the other.
#
# Cost: ~3 s added to wall-clock for `cargo nextest run --workspace`.
# The reload tests get a 15 s in-test ceiling (see
# `crates/daemon/tests/reload.rs::RELOAD_BUDGET`); wasm_e2e tests are
# fast enough (~0.5 s each) that the workspace-level slow-timeout
# above suffices.
[test-groups]
reload-serial = { max-threads = 1 }
wasm-e2e-serial = { max-threads = 1 }
acme-e2e-serial = { max-threads = 1 }

[[profile.default.overrides]]
filter = "binary(reload)"
test-group = "reload-serial"

[[profile.default.overrides]]
filter = "binary(wasm_e2e)"
test-group = "wasm-e2e-serial"

# The Pebble-backed ACME e2e tests pull a Docker image on first
# run (~10s on a fresh box) and exercise the full RFC 8555 round
# trip; their wall-clock comfortably exceeds the workspace
# slow-timeout. Bump the per-test budget and serialise so the two
# tests don't race for the same Docker daemon's container slots.
[[profile.default.overrides]]
filter = "binary(acme_http01_e2e)"
test-group = "acme-e2e-serial"
slow-timeout = { period = "30s", terminate-after = 4 }
