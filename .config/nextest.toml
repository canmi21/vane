[profile.default]
# Warn at 10s, kill at 20s. The slowest legitimate test in this
# workspace is around 4s (boot-health watchdog tied to its 3s
# deadline + spawn jitter). Anything past 10s is already off the
# expected curve; anything past 20s is wedged. terminate-after = 2
# means the kill lands at 2 × period = 20s.
slow-timeout = { period = "10s", terminate-after = 2 }
