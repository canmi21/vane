experimental = ["setup-scripts"]

[profile.default]
# Warn at 10s, kill at 20s. The slowest legitimate test in this
# workspace is around 4s (boot-health watchdog tied to its 3s
# deadline + spawn jitter). Anything past 10s is already off the
# expected curve; anything past 20s is wedged. terminate-after = 2
# means the kill lands at 2 × period = 20s.
slow-timeout = { period = "10s", terminate-after = 2 }

# Pre-build the `vane` CLI before daemon mgmt tests run. `mgmt.rs`
# shells out to the CLI for pretty/JSON output coverage, but `vane`
# lives in a sibling package and is not in nextest's `--workspace`
# implicit build set. Without this script, each mgmt test process
# races to drive `cargo build` through escargot at test runtime —
# the cold build then collides with the per-test slow-timeout above
# and wedges the suite. Doing it as a setup script keeps the build
# cost outside any test's measured wall-clock.
[scripts.setup.build-vane-cli]
command = "cargo build -p vane --bin vane"
slow-timeout = { period = "60s", terminate-after = 4 }

[[profile.default.scripts]]
filter = "binary(mgmt)"
setup = ["build-vane-cli"]

# The reload tests each spawn a real `vaned` process, then drive it
# through watcher debounce + reload + listener reconcile. Wall-clock
# is dominated by scheduler jitter when many of them race in parallel
# against the rest of the workspace's TLS handshakes — the same test
# that finishes in 1-2 s solo can take 5+ s under contention. Pinning
# the binary to a max of one concurrent test removes the cross-test
# competition and lets each one take its real time. Cost: ~3 s added
# to wall-clock for `cargo nextest run --workspace`; reload tests
# themselves get a hard 10 s ceiling inside the test (see
# `crates/daemon/tests/reload.rs::RELOAD_BUDGET`).
[test-groups]
reload-serial = { max-threads = 1 }

[[profile.default.overrides]]
filter = "binary(reload)"
test-group = "reload-serial"
