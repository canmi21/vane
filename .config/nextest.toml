experimental = ["setup-scripts"]

[profile.default]
# Slowest legitimate test ~4s (3s boot-health watchdog + spawn jitter).
# Past 10s is off-curve; past 20s is wedged.
slow-timeout = { period = "10s", terminate-after = 2 }

# Pre-build the vane + vaned binaries for CLI-driven E2E tests; export
# their paths via $NEXTEST_ENV (VANE_BIN / VANED_BIN) so test processes
# don't each run their own `cargo build`. Escargot's per-process build
# serialised on cargo's build lock under `--workspace` parallelism and
# pushed CLI-driven tests past slow-timeout on slower CI.
[scripts.setup.build-test-bins]
command = "cargo xtask build-test-bins"
slow-timeout = { period = "60s", terminate-after = 4 }

[[profile.default.scripts]]
filter = "binary(mgmt) | binary(cli_e2e)"
setup = ["build-test-bins"]

# reload + wasm_e2e spawn real vaned processes; under workspace parallelism
# their wait_until polls inflate from CPU contention. Per-binary serial groups
# (vs. one shared group) prevent 9 daemon-spawning tests from queuing behind
# each other on wall-clock budgets — costs ~3s total wall-clock.
[test-groups]
reload-serial = { max-threads = 1 }
wasm-e2e-serial = { max-threads = 1 }
acme-e2e-serial = { max-threads = 1 }
cli-e2e-serial = { max-threads = 1 }

[[profile.default.overrides]]
filter = "binary(reload)"
test-group = "reload-serial"

[[profile.default.overrides]]
filter = "binary(wasm_e2e)"
test-group = "wasm-e2e-serial"

[[profile.default.overrides]]
filter = "binary(cli_e2e)"
test-group = "cli-e2e-serial"

# Pebble-backed ACME e2e: cold Docker image pull (~10s) + full RFC 8555 round
# trip; bumped per-test budget and serialised against Docker daemon contention.
[[profile.default.overrides]]
filter = "binary(acme_http01_e2e) | binary(acme_dns01_e2e) | binary(acme_handshake_e2e)"
test-group = "acme-e2e-serial"
slow-timeout = { period = "30s", terminate-after = 4 }
