# A robust TCP listener configuration using the Flow Engine.

[connection."internal.protocol.detect"]
[connection."internal.protocol.detect".input]
method = "http"
payload = "{{req.peek_buffer_hex}}"

# Branch: Protocol IS HTTP ("true")
[connection."internal.protocol.detect".output."true".my_external_auth]
[connection."internal.protocol.detect".output."true".my_external_auth.input]
auth_token = "secret123"

[connection."internal.protocol.detect".output."true".my_external_auth.output.success."internal.transport.proxy.transparent"]
[connection."internal.protocol.detect".output."true".my_external_auth.output.success."internal.transport.proxy.transparent".input]
"target.ip" = "127.0.0.1"
"target.port" = 8080

[connection."internal.protocol.detect".output."true".my_external_auth.output.failure."internal.transport.abort"]
[connection."internal.protocol.detect".output."true".my_external_auth.output.failure."internal.transport.abort".input]

# Branch: Protocol is NOT HTTP ("false")
[connection."internal.protocol.detect".output."false"."internal.transport.abort"]
[connection."internal.protocol.detect".output."false"."internal.transport.abort".input]
