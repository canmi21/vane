# A high-performance UDP listener configuration using the Flow Engine.
# Note: UDP Flow Engine operates on a PER-PACKET basis.
#
# Logic:
# 1. Detect if the packet is a valid DNS query.
# 2. If DNS ("true"), forward it to a specific upstream DNS resolver.
# 3. If not DNS ("false"), drop the packet immediately (Security/Firewall behavior).

connection:
  internal.protocol.detect:
    input:
      method: "dns"
      payload: "{{req.peek_buffer_hex}}"
    output:
      # Branch: Packet IS DNS
      "true":
        # Using a hypothetical external logging plugin before proxying
        my_external_logger:
          input:
            msg: "DNS Query Received"
            src_ip: "{{conn.ip}}"
          output:
            "success":
              internal.transport.proxy.transparent:
                input:
                  target.ip: "8.8.8.8"
                  target.port: 53
            "failure":
              internal.transport.abort:
                input: {}
      # Branch: Packet is NOT DNS
      "false":
        internal.transport.abort:
          input: {}