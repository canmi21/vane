[package]
name = "ndjson-rpc"
version = "0.0.1"
categories = ["network-programming", "asynchronous", "web-programming::http-server"]
edition.workspace = true
keywords = ["rpc", "ndjson", "jsonl", "ipc", "hyper"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Line-delimited JSON-RPC framing with Unix socket and HTTP/1.1 chunked transports, supporting one-shot and streaming responses."

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
bytes.workspace = true
http.workspace = true
http-body-util.workspace = true
hyper = { workspace = true, features = ["server", "client", "http1"] }
hyper-util = { workspace = true, features = ["tokio"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
subtle = "2"
thiserror.workspace = true
tokio = { workspace = true, features = ["net", "io-util", "rt", "sync", "macros"] }
tokio-util.workspace = true
tracing.workspace = true

[dev-dependencies]
async-trait = "0.1"
tempfile = "3"
tokio = { workspace = true, features = ["net", "io-util", "rt", "sync", "macros", "rt-multi-thread", "time"] }
tokio-util.workspace = true
