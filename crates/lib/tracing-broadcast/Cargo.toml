[package]
name = "tracing-broadcast"
version = "0.0.1"
categories = ["development-tools::debugging", "asynchronous"]
edition.workspace = true
keywords = ["tracing", "broadcast", "subscriber", "tokio", "log"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "tracing_subscriber::Layer that fans every event into a tokio broadcast channel as JSON frames."

[lints]
workspace = true

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["sync"] }
tracing.workspace = true
tracing-subscriber = { version = "0.3", default-features = false, features = ["registry"] }

[dev-dependencies]
tokio = { workspace = true, features = ["sync", "macros", "rt"] }
