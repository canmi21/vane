[package]
name = "tokio-bind-retry"
version = "0.0.1"
categories = ["network-programming", "asynchronous"]
edition.workspace = true
keywords = ["tokio", "bind", "retry", "listener", "backoff"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Bind a tokio TcpListener / UdpSocket with exponential backoff and cancellation support."

[lints]
workspace = true

[dependencies]
tokio = { workspace = true, features = ["net", "time"] }
tokio-util.workspace = true
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "time", "net"] }
