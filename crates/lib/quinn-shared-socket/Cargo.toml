[package]
name = "quinn-shared-socket"
version = "0.0.1"
categories = ["network-programming", "asynchronous"]
edition.workspace = true
keywords = ["quic", "quinn", "udp", "socket", "async"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Run a quinn::Endpoint on a UDP socket shared with other consumers."

[lints]
workspace = true

[dependencies]
bytes.workspace = true
quinn = { version = "0.11", default-features = false, features = ["runtime-tokio"] }
virtual-socket = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["net", "macros", "rt", "rt-multi-thread", "time"] }
