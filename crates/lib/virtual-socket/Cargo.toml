[package]
name = "virtual-socket"
version = "0.0.1"
categories = ["network-programming", "asynchronous"]
edition.workspace = true
keywords = ["udp", "socket", "demux", "multiplex", "tokio"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Demultiplex a single tokio UdpSocket into multiple virtual UDP sockets sharing one physical bind."

[lints]
workspace = true

[dependencies]
bytes.workspace = true
parking_lot.workspace = true
tokio = { workspace = true, features = ["net"] }
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["net", "macros", "rt", "rt-multi-thread", "time"] }
