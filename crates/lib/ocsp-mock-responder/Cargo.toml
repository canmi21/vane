[package]
name = "ocsp-mock-responder"
version = "0.0.2"
categories = ["development-tools::testing", "cryptography"]
edition.workspace = true
keywords = ["ocsp", "mock", "test", "fixture", "tls"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "In-process mock OCSP responder for integration tests, with configurable Good / Revoked / TryLater statuses."

[lints]
workspace = true

[dependencies]
bytes = "1"
# rasn's `GeneralizedTime` is a `chrono::DateTime<FixedOffset>`; we use
# `chrono::DateTime::<Utc>::from_timestamp(...)` to convert `SystemTime`.
chrono = { version = "0.4", default-features = false, features = ["clock"] }
http-body-util = "0.1"
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
parking_lot = "0.12"
# ASN.1 codec + X.509 / OCSP types. See the sibling `ocsp-staple` for
# rationale on the rasn-vs-RustCrypto choice — same logic applies here.
rasn = "0.28"
rasn-ocsp = "0.28"
rasn-pkix = "0.28"
thiserror = "2"
tokio = { version = "1", features = ["net", "rt", "macros", "sync"] }
tracing = "0.1"
