[package]
name = "ocsp-mock-responder"
version = "0.0.1"
categories = ["development-tools::testing", "cryptography"]
edition.workspace = true
keywords = ["ocsp", "mock", "test", "fixture", "tls"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "In-process mock OCSP responder for integration tests, with configurable Good / Revoked / TryLater statuses."

[lints]
workspace = true

[dependencies]
bytes.workspace = true
const-oid = { version = "0.9", default-features = false, features = ["db"] }
der = "0.7"
http-body-util.workspace = true
hyper = { workspace = true, features = ["server", "http1"] }
hyper-util = { workspace = true, features = ["tokio"] }
parking_lot.workspace = true
sha1 = { version = "0.10", features = ["oid"] }
spki = "0.7"
thiserror.workspace = true
tokio = { workspace = true, features = ["net", "rt", "macros", "sync"] }
tracing.workspace = true
x509-cert = "0.2"
x509-ocsp = { version = "0.2", default-features = false, features = ["builder", "std"] }
