[package]
name = "rustls-pem-roots"
version = "0.0.1"
categories = ["cryptography", "network-programming"]
edition.workspace = true
keywords = ["rustls", "tls", "certificates", "pem", "trust-store"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Load PEM-encoded CA certificates from files and directories into a rustls RootCertStore, with DER-hash deduplication."

[lints]
workspace = true

[dependencies]
rustls = { workspace = true, features = ["std"] }
rustls-pemfile = "2"
thiserror.workspace = true

[dev-dependencies]
rcgen = "0.14"
rustls = { workspace = true, features = ["std", "aws-lc-rs"] }
tempfile = "3"
