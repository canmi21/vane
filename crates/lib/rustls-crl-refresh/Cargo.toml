[package]
name = "rustls-crl-refresh"
version = "0.0.1"
categories = ["cryptography", "network-programming"]
edition.workspace = true
keywords = ["rustls", "tls", "crl", "revocation", "verifier"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Process-wide CRL cache and refreshable rustls verifiers without ServerConfig churn."

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
parking_lot.workspace = true
rustls = { workspace = true, features = ["std"] }
rustls-pemfile = "2"
rustls-pki-types = "1"
time = "0.3"
tokio = { workspace = true, features = ["fs", "rt", "rt-multi-thread", "sync", "time", "macros"] }
tokio-util.workspace = true
tracing.workspace = true
x509-parser = "0.18"

[dev-dependencies]
rcgen = "0.14"
rustls = { workspace = true, features = ["std", "aws-lc-rs"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
