[package]
name = "ocsp-staple"
version = "0.0.3"
categories = ["cryptography", "network-programming"]
edition.workspace = true
keywords = ["ocsp", "tls", "stapling", "certificates", "x509"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Build OCSP requests, parse responses, and extract responder URLs from a certificate's AIA extension."

[lints]
workspace = true

[features]
default = []
# Hyper-based async fetch. Without this the crate is pure-function (parse/build only).
fetch = ["dep:hyper", "dep:hyper-util", "dep:http-body-util", "dep:tokio", "dep:url"]

[dependencies]
bytes = "1"
# ASN.1 codec + X.509 / OCSP type definitions. rasn-ocsp is pure data types
# (no builder / no helpers) — request construction and response parsing run
# through `rasn::der::{encode,decode}` directly. Replaces the prior
# RustCrypto stack (`der` + `x509-cert` + `x509-ocsp`) which stalled at
# `x509-ocsp 0.2.1` (2024-01) with no 0.3 release in sight, blocking
# `der 0.7 -> 0.8`. rasn is on its own version train and ships releases
# weekly.
rasn = "0.28"
rasn-ocsp = "0.28"
rasn-pkix = "0.28"
sha1 = "0.11"
thiserror = "2"
# AIA extension extraction stays on the chifflier/`der-parser` X.509 stack
# — this code path runs against arbitrary CA-issued leaf certs, where the
# chifflier parser's strong AIA-extension type coverage is convenient.
x509-parser = "0.18"

# Async HTTP fetch — gated behind `fetch`.
http-body-util = { version = "0.1", optional = true }
hyper = { version = "1", features = ["client", "http1"], optional = true }
hyper-util = { version = "0.1", features = ["tokio"], optional = true }
tokio = { version = "1", features = ["net", "time", "rt"], optional = true }
url = { version = "2", optional = true }

[dev-dependencies]
rcgen = "0.14"
tokio = { version = "1", features = ["macros", "rt"] }
