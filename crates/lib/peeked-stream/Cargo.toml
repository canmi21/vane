[package]
name = "peeked-stream"
version = "0.0.1"
categories = ["network-programming", "asynchronous"]
edition = "2024"
keywords = ["tokio", "async", "peek", "stream", "io"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/canmi21/vane"
rust-version = "1.95"
description = "An AsyncRead+AsyncWrite adapter that prepends a previously-peeked byte buffer to the read side of a stream while passing writes through unchanged."

[lints]
workspace = true

[dependencies]
bytes = "1"
tokio = { version = "1", features = ["io-util"] }

[dev-dependencies]
tokio = { version = "1", features = ["io-util", "macros", "rt"] }
