[package]
name = "peeked-stream"
version = "0.0.1"
categories = ["network-programming", "asynchronous"]
edition.workspace = true
keywords = ["tokio", "async", "peek", "stream", "io"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Replay a peeked byte buffer back onto the read side of an AsyncRead+AsyncWrite stream."

[lints]
workspace = true

[dependencies]
bytes = "1"
tokio = { version = "1", features = ["io-util"] }

[dev-dependencies]
tokio = { version = "1", features = ["io-util", "macros", "rt"] }
