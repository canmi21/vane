[package]
name = "hyper-cgi"
version = "0.0.1"
categories = ["web-programming::http-server", "network-programming"]
edition.workspace = true
keywords = ["cgi", "rfc3875", "hyper", "http-body", "stream"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Async CGI helpers: parse RFC 3875 stdout, stream the body, and recognise reserved env keys."

[lints]
workspace = true

[dependencies]
bytes = "1"
http = "1"
http-body = "1"
thiserror = "2"
tokio = { version = "1", features = ["io-util", "time"] }

[dev-dependencies]
http-body-util = "0.1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-util", "time", "test-util"] }
