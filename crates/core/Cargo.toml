[package]
name = "vane-core"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
arc-swap = "1.9.1"
async-trait = { workspace = true }
base64 = "0.22"
bytes = "1.11.1"
fancy-regex = "0.18.0"
http = "1.4.0"
http-body = "1.0.1"
ipnet = { version = "2.12.0", features = ["serde"] }
parking_lot = "0.12.5"
rustls-pki-types = "1"
serde = { version = "1.0.228", features = ["derive", "rc"] }
serde_json = "1.0.149"
sha2 = "0.11.0"
thiserror = "2.0.18"
tokio = { version = "1.52.1", default-features = false, features = ["net", "sync", "time"] }
tokio-util = { version = "0.7", default-features = false }
tracing = "0.1.44"
