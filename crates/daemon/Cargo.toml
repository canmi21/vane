[package]
name = "vaned"
version.workspace = true
authors.workspace = true
categories = ["network-programming", "web-programming::http-server"]
edition.workspace = true
homepage.workspace = true
keywords = ["vane", "proxy", "daemon", "reverse-proxy", "http"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "vane proxy daemon: L4 forwarding, HTTP any-bridge, WebSocket, CGI and WASM plugins"

[lints]
workspace = true

[features]
default = ["aws-lc-rs", "h3", "cgi", "wasm"]
aws-lc-rs = ["vane-engine/aws-lc-rs"]
ring = ["vane-engine/ring"]
h3 = ["vane-engine/h3"]
cgi = ["vane-engine/cgi"]
acme = ["vane-engine/acme"]
acme-dns-cloudflare = ["vane-engine/acme-dns-cloudflare"]
wasm = ["dep:vane-wasm"]

[dependencies]
anyhow = "1.0.102"
arc-swap = "1.9.1"
async-trait = { workspace = true }
clap = { version = "4.6.1", features = ["derive"] }
notify = "8.2.0"
notify-debouncer-full = "0.7.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["full"] }
tokio-util = "0.7.18"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
vane-core = { workspace = true }
vane-engine = { path = "../engine", version = "0.10.3", default-features = false }
vane-mgmt = { workspace = true }
vane-wasm = { workspace = true, optional = true }

[dev-dependencies]
assert_cmd = "2"
# `escargot` is the assert_cmd-recommended way to invoke a binary
# living in a sibling crate. Cargo only sets `CARGO_BIN_EXE_<name>`
# for binaries declared in the test's own package, so the daemon
# tests cannot find the `vane` CLI via `cargo_bin("vane")` on a
# clean checkout. escargot drives `cargo build` for the sibling
# package on first use and caches the resulting path.
escargot = "0.5"
http-body-util = "0.1"
hyper = { version = "1.9.0", features = ["server", "http1"] }
hyper-util = { version = "0.1.20", features = ["tokio"] }
nix = { version = "0.31", features = ["signal"] }
predicates = "3"
rcgen = "0.14"
rustls = { version = "0.23", default-features = false, features = ["std"] }
rustls-pki-types = "1"
serde_json = "1.0.149"
tempfile = "3"
tokio = { version = "1.52.1", features = ["full"] }
tokio-rustls = { version = "0.26", default-features = false }
vane-engine = { path = "../engine", version = "0.10.3", default-features = false }
vane-mgmt = { workspace = true }

[[bin]]
name = "vaned"
path = "src/main.rs"
