[package]
name = "vaned"
version.workspace = true
authors.workspace = true
categories = ["network-programming", "web-programming::http-server"]
edition.workspace = true
homepage.workspace = true
keywords = ["vane", "proxy", "daemon", "reverse-proxy", "http"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "vane proxy daemon: L4 forwarding, HTTP any-bridge, WebSocket, CGI and WASM plugins"

[lints]
workspace = true

[features]
default = ["aws-lc-rs", "h3", "cgi", "wasm"]
aws-lc-rs = ["vane-engine/aws-lc-rs"]
ring = ["vane-engine/ring"]
h3 = ["vane-engine/h3"]
cgi = ["vane-engine/cgi"]
acme = ["vane-engine/acme"]
acme-dns-cloudflare = ["vane-engine/acme-dns-cloudflare"]
wasm = ["dep:vane-wasm"]

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["full"] }
tokio-util = "0.7.18"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
vane-core = { workspace = true }
vane-engine = { path = "../engine", version = "0.10.0", default-features = false }
vane-mgmt = { workspace = true }
vane-wasm = { workspace = true, optional = true }

[dev-dependencies]
assert_cmd = "2"
nix = { version = "0.30", features = ["signal"] }
predicates = "3"
tempfile = "3"

[[bin]]
name = "vaned"
path = "src/main.rs"
