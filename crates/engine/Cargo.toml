[package]
name = "vane-engine"
version.workspace = true
authors.workspace = true
categories = ["network-programming", "web-programming::http-server"]
edition.workspace = true
homepage.workspace = true
keywords = ["vane", "proxy", "reverse-proxy", "http", "tls"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Runtime engine for the vane proxy: executor, listeners, TLS, and built-in middleware"

[lints]
workspace = true

[package.metadata.docs.rs]
features = ["aws-lc-rs", "h3", "cgi"]

[features]
default = ["aws-lc-rs", "h3", "cgi"]
aws-lc-rs = ["rustls/aws-lc-rs", "tokio-rustls/aws-lc-rs"]
ring = ["rustls/ring", "tokio-rustls/ring"]
h3 = []
cgi = []
acme = []
acme-dns-cloudflare = ["acme"]

[dependencies]
arc-swap = "1.9.1"
async-trait = { workspace = true }
base64 = "0.22"
bytes = "1.11.1"
dashmap = "6.1.0"
http = "1.4.0"
http-body = "1.0.1"
hyper = { version = "1.9.0", features = ["server", "http1", "http2", "client"] }
hyper-util = { version = "0.1.20", features = ["tokio", "client", "client-legacy", "server-auto", "http1", "http2"] }
memchr = "2.8.0"
notify = "8.2.0"
notify-debouncer-full = "0.7.0"
parking_lot = "0.12.5"
pin-project-lite = "0.2.17"
rustls = { version = "0.23", default-features = false, features = ["std"] }
rustls-native-certs = "0.8"
rustls-pemfile = "2"
rustls-pki-types = "1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokio = { version = "1.52.1", features = ["full"] }
tokio-rustls = { version = "0.26", default-features = false }
tokio-util = "0.7.18"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["registry"] }
vane-core = { workspace = true }
x509-parser = "0.18"

[dev-dependencies]
async-trait = { workspace = true }
http-body-util = "0.1"
rcgen = "0.14"
tempfile = "3"
