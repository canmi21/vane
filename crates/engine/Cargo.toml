[package]
name = "vane-engine"
version = "0.9.2"
edition = "2024"
rust-version = { workspace = true }

[features]
console = ["dep:utoipa", "vane-primitives/console"]
domain-target = ["dep:hickory-resolver", "vane-primitives/domain-target"]

[dependencies]
vane-primitives = { path = "../primitives" }
ahash = "0.8"
anyhow = "1"
async-trait = "0.1"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
dashmap = "6"
envflag = "0.1"
fancy-log = "0.1"
futures = "0.3"
hex = "0.4"
hickory-resolver = { version = "0.25", optional = true }
http = "1"
lazy_static = "1"
live = { version = "0.4", features = ["full"] }
nvr = "0.1"
once_cell = "1"
rand = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_resolve = { version = "0.1", features = ["json"] }
serde_yaml = "0.9"
tokio = { version = "1", features = ["full", "signal"] }
toml = "0.9"
utoipa = { version = "5", optional = true }
validator = { version = "0.20", features = ["derive"] }
varchain = { version = "0.1", features = ["ahash"] }

[lints]
workspace = true
