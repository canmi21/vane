[package]
name = "vane-mgmt"
version.workspace = true
authors.workspace = true
categories = ["network-programming", "command-line-utilities"]
edition.workspace = true
homepage.workspace = true
keywords = ["vane", "proxy", "management", "ipc", "protocol"]
license.workspace = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
description = "Management protocol (wire format, verbs, server, client) for the vane proxy"

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
hyper = { version = "1.9.0", features = ["server", "http1", "client"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["net", "io-util", "rt", "sync"] }
tracing = "0.1.44"
vane-core = { workspace = true }
