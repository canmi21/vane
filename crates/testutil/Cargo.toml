[package]
name = "vane-testutil"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = []
# Pulls in the h3 client stack (quinn + h3-quinn + h3 + rustls). Engine
# integration tests opt in via `vane-testutil = { ..., features = ["h3"] }`.
# Production code never depends on this — testutil is dev-only and the
# h3 client dependencies would otherwise cost compile time on every
# downstream test that doesn't exercise H3.
h3 = [
	"dep:quinn",
	"dep:h3",
	"dep:h3-quinn",
	"dep:rustls",
	"dep:rustls-pemfile",
	"dep:bytes",
	"dep:http",
]
# Pulls in the Pebble fixture for ACME HTTP-01 e2e tests. Engine
# tests opt in via `vane-testutil = { ..., features = ["acme"] }`.
# Skips at runtime when Docker is unavailable so a CI / dev box
# without a daemon can still cargo-test the rest of the workspace.
acme = ["dep:reqwest", "dep:testcontainers", "dep:thiserror", "dep:tracing"]

[dependencies]
hyper = { version = "1.9.0", features = ["server", "http1", "client"] }
tokio = { version = "1.52.2", features = ["net", "io-util", "rt", "time", "macros"] }
vane-core = { workspace = true }

# H3 client stack — gated behind the `h3` feature; only engine tests
# that exercise the H3 listener path opt in.
bytes = { version = "1.11.1", optional = true }
h3 = { version = "0.0.8", optional = true }
h3-quinn = { version = "0.0.10", optional = true }
http = { version = "1.4.0", optional = true }
quinn = { version = "0.11", default-features = false, features = ["runtime-tokio", "rustls-aws-lc-rs"], optional = true }
rustls = { version = "0.23", default-features = false, features = ["std"], optional = true }
rustls-pemfile = { version = "2", optional = true }

# ACME e2e (Pebble) — gated behind the `acme` feature.
# `testcontainers` runs the official Pebble image in Docker;
# `reqwest` fetches Pebble's self-signed root CA over its
# management endpoint. Both are optional so non-ACME consumers
# don't pay the compile cost.
# `rustls-tls-native-roots-no-provider` keeps reqwest from
# locking in a specific crypto backend (the default
# `rustls-tls-native-roots` selects `ring`). Vane installs
# aws-lc-rs at process boot via
# `vane_engine::crypto::install_default_provider` and tests do the
# same — having two providers in the dep graph would break
# rustls's auto-detect for the unrelated `parse_tls_args` tests.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls-native-roots-no-provider"], optional = true }
# `default-features = false` on testcontainers + explicit
# `aws-lc-rs` feature avoids pulling its `ring` default into the
# workspace's rustls dep graph. Two crypto backends in the same
# rustls instance break `CryptoProvider::install_default`'s
# auto-detect, which the engine's TLS tests rely on.
testcontainers = { version = "0.27", default-features = false, features = ["aws-lc-rs"], optional = true }
thiserror = { version = "2", optional = true }
tracing = { version = "0.1", optional = true }
