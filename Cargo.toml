[package]
name = "vane"
version = "0.1.6"
categories = ["network-programming", "web-programming", "asynchronous"]
description = "A flow-based, two-phase reverse proxy with modular protocol layers and unified middleware."
edition = "2024"
rust-version = { workspace = true }
homepage = "https://github.com/canmi21/vane"
keywords = ["network", "server", "web", "vane", "proxy"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/canmi21/vane"

[package.metadata.docs.rs]
all-features = true

[[bin]]
name = "vane"
path = "src/main.rs"

[features]
default = ["full"]
full = []

[dependencies]
tokio = { version = "1", features = ["full", "signal"] }
axum = { version = "0.8", features = ["macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dotenvy = "0.15"
fancy-log = "0.1"
shellexpand = "3"
lazy-motd = "1"
chrono = { version = "0.4", features = ["serde"] }
anynet = "1"
notify = "8"
arc-swap = "1"
dashmap = "6"
once_cell = "1"
serde_yaml = "0.9"
toml = "0.9"
ron = "0.11"
validator = { version = "0.20", features = ["derive"] }
regex = "1"
lazy_static = "1"
rand = "0.9"
fancy-regex = "0.16"
uuid = { version = "1", features = ["v4"] }

[build-dependencies]
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
serial_test = "2"
tempfile = "3"

[profile.release]
lto = true
codegen-units = 1
opt-level = "z"

[profile.minimum]
inherits = "release"
lto = true
codegen-units = 1
strip = true
opt-level = "z"
panic = "abort"

[lints]
workspace = true

[workspace]
resolver = "3"

[workspace.package]
rust-version = "1.89"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
type_complexity = "allow"

await_holding_lock = "warn"
dbg_macro = "warn"
empty_enum = "warn"
enum_glob_use = "warn"
equatable_if_let = "warn"
exit = "warn"
filter_map_next = "warn"
fn_params_excessive_bools = "warn"
if_let_mutex = "warn"
implicit_clone = "warn"
imprecise_flops = "warn"
inefficient_to_string = "warn"
linkedlist = "warn"
lossy_float_literal = "warn"
macro_use_imports = "warn"
manual_let_else = "warn"
match_same_arms = "warn"
match_wildcard_for_single_variants = "warn"
mem_forget = "warn"
must_use_candidate = "warn"
needless_borrow = "warn"
needless_continue = "warn"
needless_pass_by_ref_mut = "warn"
needless_pass_by_value = "warn"
option_option = "warn"
redundant_clone = "warn"
ref_option = "warn"
rest_pat_in_fully_bound_structs = "warn"
return_self_not_must_use = "warn"
single_match_else = "warn"
str_to_string = "warn"
suboptimal_flops = "warn"
todo = "warn"
trivially_copy_pass_by_ref = "warn"
uninlined_format_args = "warn"
unnested_or_patterns = "warn"
unused_self = "warn"
use_self = "warn"
verbose_file_reads = "warn"

rust_2018_idioms = { level = "warn", priority = -1 }
missing_debug_implementations = "warn"
missing_docs = "warn"
unreachable_pub = "warn"

# configuration for https://github.com/crate-ci/typos
[workspace.metadata.typos.default.extend-identifiers]
# These have been fixed in the past, but are still present in the changelog.
DefaultOnFailedUpdgrade = "DefaultOnFailedUpdgrade"
OnFailedUpdgrade = "OnFailedUpdgrade"