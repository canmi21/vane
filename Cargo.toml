[package]
name = "vane"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "A flow-based, two-phase reverse proxy with modular protocol layers and unified middleware."
repository = "https://github.com/canmi21/vane"
readme = "README.md"
keywords = ["network", "server", "web", "vane", "proxy"]
categories = ["network-programming", "web-programming", "development-tools"]

[[bin]]
name = "vane"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full", "signal"] }
axum = { version = "0.8", features = ["macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dotenvy = "0.15"
fancy-log = "0.1"
shellexpand = "3"
lazy-motd = "1"
chrono = { version = "0.4", features = ["serde"] }

[build-dependencies]
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
serial_test = "2"
tempfile = "3"

[profile.release]
lto = true
codegen-units = 1
opt-level = "z"

[profile.minimum]
inherits = "release"
lto = true
codegen-units = 1
strip = true
opt-level = "z"
panic = "abort"
