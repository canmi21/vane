[workspace]
members = ["src/primitives", "src/transport", "src/engine", "src/extra", "src/vane"]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"

[workspace.dependencies]
# External
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"

# Internal
vane-primitives = { path = "src/primitives" }
vane-transport = { path = "src/transport" }
vane-engine = { path = "src/engine" }
vane-extra = { path = "src/extra" }
