[package]
name = "vane"
license = "MIT"
version = "0.9.2"
edition = "2024"
rust-version = { workspace = true }
categories = ["network-programming", "web-programming", "asynchronous"]
description = "A flow-based reverse proxy with multi-layer routing and programmable pipelines."
keywords = ["network", "server", "web", "vane", "proxy"]
readme = "README.md"
homepage = "https://vaneproxy.com"
repository = "https://github.com/canmi21/vane.git"

[package.metadata.docs.rs]
all-features = true

[[bin]]
name = "vane"
path = "src/main.rs"

[features]
default = ["full", "aws-lc-rs"]
full = [
	"tcp",
	"udp",
	"tls",
	"quic",
	"httpx",
	"h2upstream",
	"h3upstream",
	"cgi",
	"static",
	"ratelimit",
	"domain-target",
	"console",
	"swagger-ui",
	"lazycert",
]

# Core Transport (L4)
tcp = ["dep:fancy-regex"]
udp = ["dep:fancy-regex"]

# Carrier Layer (L4+)
tls = ["dep:rustls", "dep:tokio-rustls", "dep:rcgen", "dep:hyper-rustls", "dep:tls-parser", "dep:x509-parser", "dep:rustls-pemfile", "dep:rustls-native-certs"]
quic = ["dep:quinn", "dep:aes"]

# Application Layer (L7)
httpx = ["dep:hyper", "dep:hyper-util", "dep:http-body", "dep:http-body-util", "dep:tower-service", "dep:axum"]

# LazyCert Integration
lazycert = ["dep:reqwest"]

# Console / Management API
console = ["dep:axum"]
swagger-ui = ["dep:utoipa-swagger-ui"]

# Upstream Capabilities
h2upstream = ["dep:reqwest"]
h3upstream = ["quic", "dep:h3", "dep:h3-quinn"]
domain-target = ["dep:hickory-resolver"]

# Plugin Flags
cgi = ["dep:base64"]
static = ["dep:infer", "dep:mime_guess"]
ratelimit = []

# Crypto Backends
aws-lc-rs = [
  "rustls?/aws-lc-rs",
  "tokio-rustls?/aws-lc-rs",
  "hyper-rustls?/aws-lc-rs",
  "quinn?/aws-lc-rs",
  "reqwest?/rustls",
]
ring = [
  "rustls?/ring",
  "tokio-rustls?/ring",
  "hyper-rustls?/ring",
  "quinn?/ring",
  "reqwest?/rustls-no-provider",
  "reqwest?/rustls-native-certs",
]

[dependencies]
tokio = { version = "1", features = ["full", "signal"] }
axum = { version = "0.8", features = ["macros", "multipart"], optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
envflag = "0.1"
fancy-log = "0.1"
shellexpand = "3"
lazy-motd = "1"
chrono = { version = "0.4", features = ["serde"] }
dashmap = "6"
once_cell = "1"
serde_yaml = "0.9"
toml = "0.9"
validator = { version = "0.20", features = ["derive"] }
regex = "1"
lazy_static = "1"
rand = "0.9"
fancy-regex = { version = "0.17", optional = true }
uuid = { version = "1", features = ["v4", "v7", "serde"] }
futures = "0.3"
anyhow = "1"
ahash = "0.8"
nvr = "0.1"
varchain = { version = "0.1", features = ["ahash"] }
serde_resolve = { version = "0.1", features = ["json"] }
hex = "0.4"
async-trait = "0.1"
reqwest = { version = "0.13", default-features = false, features = ["json"], optional = true }
hickory-resolver = { version = "0.25", optional = true }
tls-parser = { version = "0.12", optional = true }
x509-parser = { version = "0.18", optional = true }
quinn = { version = "0.11", default-features = false, features = ["runtime-tokio"], optional = true }
quinn-proto = "0.11"
tokio-rustls = { version = "0.26", default-features = false, features = ["logging", "tls12"], optional = true }
rustls-pemfile = { version = "2", optional = true }
thiserror = "2"
hyper = { version = "1", features = ["full"], optional = true }
hyper-util = { version = "0.1", features = ["full"], optional = true }
http-body-util = { version = "0.1", optional = true }
bytes = "1"
http = "1"
rcgen = { version = "0.14", optional = true }
httparse = "1"
h3 = { version = "0.0.8", optional = true }
h3-quinn = { version = "0.0.10", optional = true }
http-body = { version = "1", optional = true }
oneshot = "0.1"
rustls = { version = "0.23", default-features = false, features = ["logging", "std", "tls12"], optional = true }
hyper-rustls = { version = "0.27", default-features = false, features = ["http2", "native-tokio", "logging", "tls12"], optional = true }
infer = { version = "0.19", optional = true }
rustls-native-certs = { version = "0.8", optional = true }
tower-service = { version = "0.3", optional = true }
ring = "0.17"
aes = { version = "0.8", optional = true }
base64 = { version = "0.22", optional = true }
mime_guess = { version = "2", optional = true }
percent-encoding = "2"
tokio-util = "0.7"
futures-util = "0.3"
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-axum = "0.2"
utoipa-swagger-ui = { version = "9", features = ["axum"], optional = true }
sha2 = "0.10"
tar = "0.4"
flate2 = "1"
sigterm = { version = "0.3", features = ["full"] }
live = { version = "0.4", features = ["full"] }

[build-dependencies]
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
dirs = "6"
tower = "0.5"
axum = { version = "0.8", features = ["macros"] }

[profile.release]
lto = true
codegen-units = 1
opt-level = "z"

[profile.minimum]
inherits = "release"
lto = true
codegen-units = 1
strip = true
opt-level = "z"
panic = "abort"

[lints]
workspace = true

[workspace]
resolver = "3"

[workspace.package]
rust-version = "1.93"

[workspace.lints.rust]
unsafe_code = "forbid"
rust_2018_idioms = { level = "warn", priority = -1 }
missing_debug_implementations = "allow"
missing_docs = "allow"
unreachable_pub = "warn"

[workspace.lints.clippy]
type_complexity = "allow"
await_holding_lock = "warn"
dbg_macro = "warn"
empty_enums = "warn"
enum_glob_use = "warn"
equatable_if_let = "warn"
exit = "warn"
filter_map_next = "warn"
fn_params_excessive_bools = "warn"
if_let_mutex = "warn"
implicit_clone = "warn"
imprecise_flops = "warn"
inefficient_to_string = "warn"
linkedlist = "warn"
lossy_float_literal = "warn"
macro_use_imports = "warn"
manual_let_else = "warn"
match_same_arms = "warn"
match_wildcard_for_single_variants = "warn"
mem_forget = "warn"
must_use_candidate = "warn"
needless_borrow = "warn"
needless_continue = "warn"
needless_pass_by_ref_mut = "warn"
needless_pass_by_value = "warn"
option_option = "warn"
redundant_clone = "warn"
ref_option = "warn"
rest_pat_in_fully_bound_structs = "warn"
return_self_not_must_use = "warn"
single_match_else = "warn"
str_to_string = "warn"
suboptimal_flops = "warn"
todo = "warn"
trivially_copy_pass_by_ref = "warn"
uninlined_format_args = "warn"
unnested_or_patterns = "warn"
unused_self = "warn"
use_self = "warn"
verbose_file_reads = "warn"

# configuration for https://github.com/crate-ci/typos
[workspace.metadata.typos.default.extend-identifiers]
# These have been fixed in the past, but are still present in the changelog.
DefaultOnFailedUpdgrade = "DefaultOnFailedUpdgrade"
OnFailedUpdgrade = "OnFailedUpdgrade"