[workspace]
resolver = "3"
members = [
	"crates/core",
	"crates/daemon",
	"crates/engine",
	"crates/mgmt",
	"crates/testutil",
	"crates/vane",
	"crates/wasm",
	"tests",
]

[workspace.package]
version = "0.10.0"
authors = ["Canmi <t@canmi.icu>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/canmi21/vane"
rust-version = "1.95"

[workspace.lints.rust]
unsafe_code = "deny"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }

[workspace.dependencies]
vane-core = { path = "crates/core", version = "0.10.0" }
vane-engine = { path = "crates/engine", version = "0.10.0" }
vane-mgmt = { path = "crates/mgmt", version = "0.10.0" }
vane-testutil = { path = "crates/testutil", version = "0.10.0" }
vane-wasm = { path = "crates/wasm", version = "0.10.0" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0
codegen-units = 256
lto = false
strip = false
debug = "full"
panic = "unwind"
