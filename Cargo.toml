[workspace]
members = [
    "src/primitives",
    "src/transport",
    "src/engine",
    "src/extra",
    "src/vane",
    "src/test-utils",
    "tests",
]
resolver = "3"

[workspace.package]
version = "0.10.1"
edition = "2024"
license = "MIT"

[workspace.dependencies]
# External
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Internal
vane-primitives = { path = "src/primitives" }
vane-transport = { path = "src/transport" }
vane-engine = { path = "src/engine" }
vane-extra = { path = "src/extra" }
vane-test-utils = { path = "src/test-utils" }
