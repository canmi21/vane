# `cargo deny check` runs all four sections; `bans` is the
# load-bearing one (workspace direct-dep version unity).

[graph]
all-features = true

[advisories]
# unmaintained fires too eagerly on stable long-lived crates.
unmaintained = "none"
ignore = []

[licenses]
# Permissive OSS only; add identifiers as cargo-deny reports them.
confidence-threshold = 0.8
allow = [
	"Apache-2.0",
	"Apache-2.0 WITH LLVM-exception",
	"BSD-3-Clause",
	"CC0-1.0",
	"ISC",
	"MIT",
	"Unicode-3.0",
	"Zlib",
]

# CDLA-Permissive-2.0 is a data license (Mozilla CA bundle) — scope
# per-crate so a future code crate adopting it still gets caught.
[[licenses.exceptions]]
name = "webpki-roots"
allow = ["CDLA-Permissive-2.0"]

[[licenses.exceptions]]
name = "webpki-root-certs"
allow = ["CDLA-Permissive-2.0"]

[sources]
# warn (not deny) until we audit what's actually in scope.
unknown-registry = "warn"
unknown-git = "warn"
allow-git = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
# vane-testutil is path-only (publish = false); path constrains source.
allow-wildcard-paths = true

# skip-tree suppresses whole upstream subtrees that bring multiple
# majors we can't unify. Revisit each line when the upstream bumps.
skip-tree = [
	# wasmtime / wit-component: split majors of wasm-encoder, wasmparser, wit-*.
	{ crate = "wasmtime" },
	{ crate = "wit-component" },
	# rustls-platform-verifier: jni + thiserror@1 + supports-color@2 (Android).
	{ crate = "rustls-platform-verifier" },
	# instant-acme: older rand / rand_core / getrandom majors.
	{ crate = "instant-acme" },
	# bollard / testcontainers: older windows-targets, nix.
	{ crate = "bollard" },
	{ crate = "testcontainers" },
	# x509-cert 0.2 holds RustCrypto formats stack at older majors; revisit on x509-ocsp 0.3.
	{ crate = "x509-cert" },
]
skip = [
	# owo-colors's feature graph pulls supports-color 2 and 3 simultaneously.
	{ crate = "supports-color@2.1.0" },
]
