# cargo-deny config. Enforces version consistency across the
# workspace's third-party deps now that they live in each crate's
# Cargo.toml rather than in a centralized [workspace.dependencies].
#
# Run locally:  cargo deny check bans
# Run all:      cargo deny check
#
# Other checks (advisories, licenses, sources) are intentionally
# left at cargo-deny's defaults — only `bans` is the gate this repo
# depends on. Tightening the rest is fair game when the need shows up.

[graph]
all-features = true

[bans]
# The reason this config exists: any crate appearing at two different
# versions in the resolved graph fails the gate. Workspace members
# must agree on third-party versions; transitive-only duplicates that
# we genuinely can't unify (typically because two upstream crates pin
# different majors) get listed under `skip` below with a one-line
# rationale.
multiple-versions = "deny"
wildcards = "deny"
# `vane-testutil` is intentionally path-only in [workspace.dependencies]
# (no `version =`) because it's `publish = false`; cargo strips it
# from sibling crates' published manifests entirely. cargo-deny sees
# the omitted version as a wildcard, which is fine for path-based
# entries — the path constrains the source.
allow-wildcard-paths = true

# Transitive duplicates we can't unify. Each entry suppresses an
# entire upstream subtree — what we're saying with each line is
# "we accept any version dup that exists *only because of this
# upstream's transitive graph*; we'll re-evaluate when the upstream
# bumps." Workspace-direct duplicates are still caught by the
# `multiple-versions = "deny"` above.
skip-tree = [
	# wasmtime + wit-component pin different majors of the wasm
	# tooling stack (wasm-encoder, wasmparser, wit-bindgen, wit-parser).
	# wasmtime is a runtime dep of vane-wasm; wit-component is a
	# build-dep of testutil for fixture generation.
	{ crate = "wasmtime" },
	{ crate = "wit-component" },
	# rustls-platform-verifier brings jni / android crypto bits
	# (thiserror@1, supports-color@2, jni, jni-sys, core-foundation
	# older versions). Pulled transitively via reqwest in testutil's
	# acme feature.
	{ crate = "rustls-platform-verifier" },
	# instant-acme pulls older majors of rand / rand_core / getrandom.
	# Used by the engine's ACME feature; bump path is upstream.
	{ crate = "instant-acme" },
	# Docker / container test fixtures bring older windows-targets,
	# nix, and a few RustCrypto-stack duplicates.
	{ crate = "bollard" },
	{ crate = "testcontainers" },
	# x509-cert 0.2 holds back the RustCrypto formats stack
	# (const-oid 0.9, der 0.7, sha2 0.10, digest 0.10, block-buffer
	# 0.10, crypto-common 0.1) against clienthello's newer hkdf which
	# brings 0.10 / 0.8 / 0.11 / 0.11 / 0.12 / 0.2. Re-unify when
	# x509-ocsp ships a 0.3 release on crates.io (not yet, as of
	# this commit).
	{ crate = "x509-cert" },
]
skip = [
	# owo-colors brings two versions of supports-color through its
	# own feature graph (one for the v2-era detection path, one for
	# v3). Same direct dep, two transitive supports-color majors —
	# nothing the workspace can do about it short of forking owo-colors.
	{ crate = "supports-color@2.1.0" },
]
