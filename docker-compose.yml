services:
  vane:
    image: canmi/vane:latest
    container_name: vane
    networks:
      - vaneproxy
    env_file:
      - ./.env
    ports:
      - '80:80/tcp'
      - '443:443/tcp'
      - '443:443/udp'
			- '127.0.0.1:3333:3333/tcp'
    volumes:
      - /opt/vane:/root/vane
    restart: unless-stopped

networks:
  vaneproxy:
    driver: bridge
